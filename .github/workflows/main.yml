name: Cloudbase-Init tests rerun

on: [push, pull_request]

jobs:
  linux-unit-tests:
    runs-on: lxd_scale_set
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10"]

    steps:
    - name: Checkout cloudbase-init repository
      uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install python3 tox
      shell: bash
      run: |
        python3 -m pip install tox setuptools --upgrade
    - name: Run Cloudbase-Init unit tests with tox
      shell: bash
      run: |
        git clone https://github.com/cloudbase/cloudbase-init
        cd cloudbase-init
        tox run-parallel --parallel-live --parallel-no-spinner -e py3,pep8,cover,docs
